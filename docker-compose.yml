version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    container_name: lunia_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/app:/code/app  # Canlı kod güncellemesi için
    restart: unless-stopped
    networks:
      - lunia_network

  frontend:
    build: 
      context: ./frontend
    container_name: lunia_frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./frontend/src:/app/src  # Canlı kod güncellemesi için
    depends_on:
      - backend                  # Önce backend ayağa kalksın
    restart: unless-stopped
    networks:
      - lunia_network

networks:
  lunia_network:
    driver: bridge               # İki konteynerin birbiriyle konuşmasını sağlar